<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Rename & Clean Tool</title>
    <link rel="stylesheet" href="style.css">
    <!-- JSZip library for ZIP downloads -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📁 Bulk Rename & Clean Tool</h1>
            <p>Upload multiple files, rename them sequentially, and download as ZIP</p>
        </header>

        <!-- Drag & Drop Area -->
        <div id="dropZone" class="drop-zone">
            <div class="drop-zone-content">
                <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <p>Drag & drop files here or <label for="fileInput" class="browse-link">browse</label></p>
                <input type="file" id="fileInput" multiple accept="*/*">
                <p class="file-count" id="fileCount">No files selected</p>
            </div>
        </div>

        <!-- Controls Section -->
        <div class="controls">
            <div class="input-group">
                <label for="baseName">Base Filename:</label>
                <input type="text" id="baseName" placeholder="e.g., Holi_Trip" value="Holi_Trip">
            </div>

            <div class="button-group">
                <button id="renameBtn" class="btn btn-primary" disabled>🔄 Rename Files</button>
                <button id="uppercaseBtn" class="btn btn-secondary" disabled>🔠 Convert to UPPERCASE</button>
                <button id="lowercaseBtn" class="btn btn-secondary" disabled>🔡 Convert to lowercase</button>
                <button id="downloadBtn" class="btn btn-success" disabled>📥 Download ZIP</button>
                <button id="resetBtn" class="btn btn-danger" disabled>🗑️ Reset</button>
            </div>
        </div>

        <!-- Progress Bar -->
        <div id="progressContainer" class="progress-container" style="display: none;">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <p id="progressText" class="progress-text">Processing...</p>
        </div>

        <!-- Preview Table -->
        <div class="table-container">
            <table id="previewTable" class="preview-table">
                <thead>
                    <tr>
                        <th>Original Name</th>
                        <th>New Name</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="2" class="empty-message">No files uploaded yet</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <footer>
            <p>All processing happens in your browser. No files are uploaded to any server.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
